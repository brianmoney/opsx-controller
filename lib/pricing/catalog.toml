# ===========================================================================
# Pricing Catalog
# ===========================================================================
#
# This file stores model pricing entries used by the cost estimation pipeline.
# It is operator-maintained and version-controlled alongside the loader code.
#
# ---------------------------------------------------------------------------
# How to add a new model entry
# ---------------------------------------------------------------------------
#
# Add a new ``[[entries]]`` block below. Required fields for every entry:
#   provider        - API provider name (e.g. "openai", "anthropic", "google")
#   model_id        - canonical model identifier (e.g. "gpt-4o")
#   display_name    - human-readable name for reports (e.g. "GPT-4o")
#   billing_mode    - "per_token" or "subscription"
#   currency        - ISO 4217 three-letter code (e.g. "USD")
#   effective_date  - ISO-8601 date when this pricing became/become effective
#
# For per-token models (billing_mode = "per_token"):
#   input_price_per_mtok          (required)  USD per million input tokens
#   output_price_per_mtok         (optional)  USD per million output tokens
#   cached_input_price_per_mtok   (optional)  USD per million cached input tokens
#   reasoning_price_per_mtok      (optional)  USD per million reasoning tokens
#
#   At minimum ``input_price_per_mtok`` must be a positive value.  Other
#   per-mtok fields can be omitted when the provider does not break down
#   that token category separately.
#
# For subscription models (billing_mode = "subscription"):
#   subscription_period  (required)  "monthly" or "yearly"
#   subscription_price   (required)  price in the specified currency
#
# Optional fields (all modes):
#   notes  - freeform operator notes about this entry
#
# ---------------------------------------------------------------------------
# How to update a pricing rate
# ---------------------------------------------------------------------------
#
# **Do not edit existing entries in place.**  Instead, add a new
# ``[[entries]]`` block with the same ``(provider, model_id)`` pair and a
# later ``effective_date``.  The loader always picks the entry with the
# latest ``effective_date`` for a given pair.  This preserves historical
# pricing so that past telemetry records remain reproducible.
#
# Example: GPT-4o price reduction effective 2025-07-01
#
#   # Old entry (kept for history):
#   [[entries]]
#   provider = "openai"
#   model_id = "gpt-4o"
#   display_name = "GPT-4o"
#   billing_mode = "per_token"
#   currency = "USD"
#   input_price_per_mtok = 2.50
#   effective_date = "2025-01-01"
#
#   # New entry (becomes active on 2025-07-01):
#   [[entries]]
#   provider = "openai"
#   model_id = "gpt-4o"
#   display_name = "GPT-4o (reduced)"
#   billing_mode = "per_token"
#   currency = "USD"
#   input_price_per_mtok = 2.00
#   effective_date = "2025-07-01"
#
# ---------------------------------------------------------------------------
# How to handle model deprecation
# ---------------------------------------------------------------------------
#
# When a model is discontinued:
#   1. Keep the existing entries in the catalog — historical runs
#      that used the model still need reproducible pricing.
#   2. Add a ``notes`` field to the last entry indicating deprecation,
#      e.g. ``notes = "Deprecated 2025-09-01; superseded by gpt-5"``.
#   3. There is no ``deprecated`` or ``superseded_by`` field yet; use
#      ``notes`` for tracking.
#
# ---------------------------------------------------------------------------

[catalog]
version = "1.0.0"
updated = "2026-07-05"

